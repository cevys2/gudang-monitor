name: Auto ETL Gudang (15 Menit)

on:
  schedule:
    - cron: "*/15 * * * *" 
  workflow_dispatch: 

jobs:
  run-etl:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Tarik Kode dari Repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install Kurir (Dependencies)
        run: pip install -r requirements.txt

      - name: 🔐 Bikin Brankas Rahasia (secrets.toml)
        env:
          KUNCI_RAHASIA: ${{ secrets.STREAMLIT_SECRETS }}
        run: |
          mkdir -p .streamlit
          echo "$KUNCI_RAHASIA" > .streamlit/secrets.toml

      - name: 🚀 Eksekusi Mesin ETL
        run: python etl_gudang.py
